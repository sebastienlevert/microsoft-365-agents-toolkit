# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/task.schema.json

id: negative-trigger-joke
name: Negative Trigger Joke
description: Joke should not trigger ATK
tags:
  - negative-trigger
inputs:
  prompt: "Tell me a short joke about coffee."
expected:
  should_trigger: false
graders:
  - type: text
    name: omits-skill-keywords
    config:
      not_contains:
        - "365"
        - "agents"
        - "microsoft"
        - "toolkit"

