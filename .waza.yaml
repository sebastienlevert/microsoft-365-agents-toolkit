# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/config.schema.json

paths:
  skills: packages/vscode-extension/skills/
  evals: evals/
  results: evals/results/
defaults:
  engine: copilot-sdk
  model: claude-sonnet-4.6
  timeout: 300
  parallel: true
  workers: 4
  verbose: true
  sessionLog: false
cache:
  enabled: false
  dir: .waza-cache
server:
  port: 3000
  resultsDir: evals/results/
dev:
  model: claude-sonnet-4-20250514
  target: medium-high
  maxIterations: 5
tokens:
  warningThreshold: 500
  fallbackLimit: 1000
graders:
  programTimeout: 30
storage:
  containerName: waza-results
