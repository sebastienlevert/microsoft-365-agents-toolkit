name: uitest-vscuse-samples-new
#
# Caller that runs Sample_* plans via the shared reusable workflow.
on:
  workflow_dispatch:
    inputs:
      test_plan:
        description: "Comma-separated list of test plan to run (e.g. DA_Regenrate_Action, Message_Extension_py_Local_Debug)"
        required: false
      image_tag:
        description: "Docker image tag to use (e.g., 'latest', 'CY251212stable')"
        required: true
        default: "latest"
      vscuse_version:
        description: "VSCUSE Python package version to use (e.g., 'latest', 'v0.2.47')"
        required: false
        type: string
        default: "latest"
      email-receiver:
        description: "email notification receiver"
        required: false
        type: string
      max_retries:
        description: "Maximum number of retry attempts (1-20, default: 7)"
        required: false
        type: number
        default: 7
      schedule_trigger:
        description: "Whether the build is triggered by schedule"
        type: boolean
        default: false

permissions:
  actions: read

jobs:
  run:
    uses: ./.github/workflows/ui-test-vscuse-common.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      actions: write
    with:
      test_plan: ${{ github.event.inputs.test_plan }}
      image_tag: ${{ github.event.inputs.image_tag }}
      vscuse_version: ${{ github.event.inputs.vscuse_version }}
      email_receiver: ${{ github.event.inputs.email-receiver }}
      max_retries: ${{ fromJson(github.event.inputs.max_retries || '7') }}
      schedule_trigger: ${{ github.event.inputs.schedule_trigger == 'true' }}
      # Pipeline-specific knobs
      plan_find_args: '-name "Sample_*.json"'
      main_timeout_minutes: 80
      no_failed_step_text: "No failed step found"
      filter_no_errors_found: false
      email_subject_suffix: "[Samples]"
