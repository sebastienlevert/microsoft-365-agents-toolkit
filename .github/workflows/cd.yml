name: CD
run-name: CD-${{ github.run_id }}-${{ github.ref_name }}-${{ inputs.preid }}-${{ inputs.series }}
on:
  workflow_dispatch:
    inputs:
      preid:
        description: "preid name(alpha, preview, rc, stable)"
        required: true
        default: "alpha"
      series:
        description: "release sprint series name"
        required: false
        default: ""
      pkgs:
        type: string
        required: false
        description: "Please enter the package names you want to publish, such as cli, vscode, ui, sdk, server and template. Please separate multiple entries with spaces"
        default: ""
      vsrelease:
        type: boolean
        default: false
        description: "Whether to release vs product"
      vsChannelName:
        type: string
        default: "IntPreview"
        description: "VS channel to target (IntPreview=main/Canary, IntRelease=rel/insiders, Release=rel/stable)"
        required: false
      vstemplate:
        type: boolean
        default: false
        description: "Whether to release vs template"
      goproduct:
        type: boolean
        default: false
        description: "Whether to release TTK as publish product"
      skipmarkdownandvulnerabilitycheck:
        type: boolean
        default: false
        description: "Whether to skip Markdown files and vulnerability check"
      run_test_cases:
        type: boolean
        default: false
        description: "Whether to run test cases after CD"
  schedule:
    - cron: "15 11 * * *"  # UTC+8 19:15 make sure the daily build generated before the daily test pipeline trigger

permissions:
  actions: write
  contents: write

jobs:
  cd:
    runs-on: ubuntu-latest
    outputs:
      markdown-check-result: ${{ steps.markdown-check.outcome }}
      security-check-vsc-result: ${{ steps.security-check-vsc.outcome }}
      security-check-vs-result: ${{ steps.security-check-vs.outcome }}
      markdown-check-samples-result: ${{ steps.markdown-check-samples.outcome }}
      security-check-samples-result: ${{ steps.security-check-samples.outcome }}
    env:
      CI: true
      PREID: ${{ github.event.inputs.preid }}
      VS_RELEASE: ${{ github.event.inputs.vsrelease }}
      PRODUCTION: ${{ github.event.inputs.goproduct }}
    steps:
      - name: Validate CD branch
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/dev' && !startsWith(github.ref, 'refs/heads/release/') }}
        run: |
          echo It's allowed to run CD on dev or release branch.
          exit 1

      - name: Validate inputs for release
        if: ${{ github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/heads/release/') && github.event.inputs.preid == 'alpha' }}
        run: |
          echo It's not allowed to run CD on release branch for alpha.
          exit 1

      - name: Valiadte inputs for dev
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev' && github.event.inputs.preid != 'alpha' }}
        run: |
          echo It's only allowed to alpha on dev branch.
          exit 1

      - name: Validate schedule
        if: ${{ github.event_name == 'schedule' && github.ref != 'refs/heads/dev' }}
        run: |
          echo It's not allowed to run schedule release except dev branch.
          exit 1

      - id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_GITHUB_APP_ID }}
          private-key: ${{ secrets.APP_GITHUB_APP_PRIVATE_KEY }}

      - name: Checkout branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{ github.ref }}

      - name: Set up Python for README image analysis
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies for image or hyperlink analysis
        if: ${{ github.event.inputs.skipmarkdownandvulnerabilitycheck == 'false' || github.event.inputs.skipmarkdownandvulnerabilitycheck == ''}}
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-dateutil
          python -m pip install requests

      - name: 🔍Check Markdown files image/hyperlink availability
        id: markdown-check
        if: ${{ github.event.inputs.skipmarkdownandvulnerabilitycheck == 'false' || github.event.inputs.skipmarkdownandvulnerabilitycheck == ''}}
        continue-on-error: true  # Temporary allow failure
        run: |
          python -u .github/scripts/analyze_markdown.py --scan-directory "templates/vsc" "templates/vs"  --file-patterns "**/README.md" "**/README.md.tpl" --extra-files "packages/vscode-extension/CHANGELOG.md"

      - name: Checkout samples repo
        if: ${{ github.event.inputs.skipmarkdownandvulnerabilitycheck == 'false' || github.event.inputs.skipmarkdownandvulnerabilitycheck == ''}}
        uses: actions/checkout@v3
        with:
          repository: OfficeDev/microsoft-365-agents-toolkit-samples
          path: samples-repo
          token: ${{ steps.generate-token.outputs.token }}

      - name: 🔍Check Markdown files in samples repo
        id: markdown-check-samples
        if: ${{ github.event.inputs.skipmarkdownandvulnerabilitycheck == 'false' || github.event.inputs.skipmarkdownandvulnerabilitycheck == ''}}
        continue-on-error: true
        run: |
          python -u .github/scripts/analyze_markdown.py --scan-directory "samples-repo" --file-patterns "**/README.md" "**/README.md.tpl"

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: 🔍Check package.json files for security vulnerabilities(VSC)
        if: ${{ github.event.inputs.skipmarkdownandvulnerabilitycheck == 'false' || github.event.inputs.skipmarkdownandvulnerabilitycheck == ''}}
        id: security-check-vsc
        continue-on-error: true  # Allow pipeline to continue, notification will be sent on failure
        run: |
          python -u .github/scripts/check_npm_vulnerabilities.py --scan-directory "templates/vsc"

      - name: Setup .NET for NuGet security check
        if: ${{ github.event.inputs.skipmarkdownandvulnerabilitycheck == 'false' || github.event.inputs.skipmarkdownandvulnerabilitycheck == ''}}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔍Check C# project NuGet packages for security vulnerabilities(VS)
        if: ${{ github.event.inputs.skipmarkdownandvulnerabilitycheck == 'false' || github.event.inputs.skipmarkdownandvulnerabilitycheck == ''}}
        id: security-check-vs
        continue-on-error: true  # Allow pipeline to continue, notification will be sent on failure
        run: |
          python -u .github/scripts/check_nuget_vulnerabilities.py --scan-directory "templates/vs"

      - name: 🔍Check package.json files for security vulnerabilities(Samples)
        if: ${{ github.event.inputs.skipmarkdownandvulnerabilitycheck == 'false' || github.event.inputs.skipmarkdownandvulnerabilitycheck == ''}}
        id: security-check-samples
        continue-on-error: true  # Allow pipeline to continue, notification will be sent on failure
        run: |
          python -u .github/scripts/check_npm_vulnerabilities.py --scan-directory "samples-repo"

      - name: 📋 Check Results Summary
        if: ${{ always() && (github.event.inputs.skipmarkdownandvulnerabilitycheck == 'false' || github.event.inputs.skipmarkdownandvulnerabilitycheck == '') }}
        run: |
          echo "## 🔍 Quality Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Markdown Check - Main Repo
          if [ "${{ steps.markdown-check.outcome }}" == "failure" ]; then
            echo "| Markdown Check | templates/vsc, templates/vs | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.markdown-check.outcome }}" == "success" ]; then
            echo "| Markdown Check | templates/vsc, templates/vs | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.markdown-check.outcome }}" == "skipped" ]; then
            echo "| Markdown Check | templates/vsc, templates/vs | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Markdown Check - Samples Repo
          if [ "${{ steps.markdown-check-samples.outcome }}" == "failure" ]; then
            echo "| Markdown Check | samples-repo | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.markdown-check-samples.outcome }}" == "success" ]; then
            echo "| Markdown Check | samples-repo | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.markdown-check-samples.outcome }}" == "skipped" ]; then
            echo "| Markdown Check | samples-repo | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Security Check - VSC
          if [ "${{ steps.security-check-vsc.outcome }}" == "failure" ]; then
            echo "| Security Check (npm) | templates/vsc | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.security-check-vsc.outcome }}" == "success" ]; then
            echo "| Security Check (npm) | templates/vsc | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Security Check - VS
          if [ "${{ steps.security-check-vs.outcome }}" == "failure" ]; then
            echo "| Security Check (NuGet) | templates/vs | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.security-check-vs.outcome }}" == "success" ]; then
            echo "| Security Check (NuGet) | templates/vs | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Security Check - Samples
          if [ "${{ steps.security-check-samples.outcome }}" == "failure" ]; then
            echo "| Security Check (npm) | samples-repo | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.security-check-samples.outcome }}" == "success" ]; then
            echo "| Security Check (npm) | samples-repo | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Show warning/error annotations for failed checks
          if [ "${{ steps.markdown-check.outcome }}" == "failure" ]; then
            echo "::error title=Markdown Check Failed::Markdown files image/hyperlink check failed in templates/vsc and templates/vs"
          fi
          if [ "${{ steps.markdown-check-samples.outcome }}" == "failure" ]; then
            echo "::error title=Markdown Check (Samples) Failed::Markdown files image/hyperlink check failed in samples-repo"
          fi
          if [ "${{ steps.security-check-vsc.outcome }}" == "failure" ]; then
            echo "::error title=Security Check (VSC) Failed::npm vulnerabilities found in templates/vsc"
          fi
          if [ "${{ steps.security-check-vs.outcome }}" == "failure" ]; then
            echo "::error title=Security Check (VS) Failed::NuGet vulnerabilities found in templates/vs"
          fi
          if [ "${{ steps.security-check-samples.outcome }}" == "failure" ]; then
            echo "::error title=Security Check (Samples) Failed::npm vulnerabilities found in samples-repo"
          fi

      - name: Install wine64
        run: |
          sudo dpkg --add-architecture i386
          sudo mkdir -pm755 /etc/apt/keyrings
          sudo wget -O /etc/apt/keyrings/winehq-archive.key https://dl.winehq.org/wine-builds/winehq.key
          sudo wget -NP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/jammy/winehq-jammy.sources
          sudo apt update
          sudo apt install --install-recommends winehq-stable -y
          sudo ln -s /usr/bin/wine /usr/bin/wine64
          wine --version
          wine64 --version

      - name: Setup npm registry
        run: |
          echo "${{ secrets.NPMRC }}" > ~/.npmrc
      
      - name: Setup git
        run: |
          git config --global user.name 'wh-alice'
          git config --global user.email 'alicewan@microsoft.com'

      - name: manage pkgs to release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: bash .github/scripts/lerna.sh ${{github.event.inputs.pkgs}}

      - name: Setup project
        run: |
          npm run setup

      - name: release alpha npm packages to npmjs.org
        if: ${{ github.ref == 'refs/heads/dev' }}
        run: |
          npx lerna version prerelease --preid=alpha.$(git rev-parse --short HEAD) --exact --no-push --allow-branch dev --yes

      - name: release preview packages to npmjs.org
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.preid == 'preview' }}
        run: |
          npx lerna version prerelease --preid=beta.$(date "+%Y%m%d%H") --exact --no-push --allow-branch ${GITHUB_REF#refs/*/} --yes

      - name: version rc npm packages to npmjs.org
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.preid == 'rc' }}
        run: |
          npx lerna version prerelease --conventional-prerelease --preid=rc --no-changelog --allow-branch ${GITHUB_REF#refs/*/} --yes

      - name: version stable npm packages to npmjs.org
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/dev' && github.event.inputs.preid == 'stable' }}
        run: |
          npx lerna version --conventional-commits --conventional-graduate --no-changelog --allow-branch ${GITHUB_REF#refs/*/} --yes

      - name: version change
        id: version-change
        run: |
          echo "CHANGED=$(git tag --points-at HEAD | xargs)" >> $GITHUB_OUTPUT
          echo "TEMPLATE_VERSION=$(git tag --points-at HEAD | grep templates)" >> $GITHUB_OUTPUT
          echo "EXTENSION_VERSION=$(git tag --points-at HEAD | grep ms-teams-vscode-extension@)" >> $GITHUB_OUTPUT
          git tag --points-at HEAD | grep templates | grep rc | xargs -r git push -d origin

      - name: update template rc tag
        uses: richardsimko/update-tag@v1.0.7
        if: ${{ (contains(steps.version-change.outputs.CHANGED, 'templates@') || contains(steps.version-change.outputs.CHANGED, '@microsoft/teamsfx')) && github.event_name == 'workflow_dispatch' && github.event.inputs.preid == 'rc' }}
        with:
          tag_name: "templates@0.0.0-rc"
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: release templates' RC version to github
        if: ${{ (contains(steps.version-change.outputs.CHANGED, 'templates@') || contains(steps.version-change.outputs.CHANGED, '@microsoft/teamsfx')) && github.event_name == 'workflow_dispatch' && github.event.inputs.preid == 'rc' }}
        uses: ncipollo/release-action@v1.10.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          prerelease: true
          tag: "templates@0.0.0-rc"
          artifacts: |
            ${{ github.workspace }}/templates/build/fallback/common.zip
            ${{ github.workspace }}/templates/build/fallback/js.zip
            ${{ github.workspace }}/templates/build/fallback/ts.zip
            ${{ github.workspace }}/templates/build/fallback/python.zip
            ${{ github.workspace }}/templates/build/fallback/csharp.zip
            ${{ github.workspace }}/templates/build/metadata.zip
          allowUpdates: true
          removeArtifacts: true

      - name: Create Templates Stable Release
        if: ${{ contains(steps.version-change.outputs.CHANGED, 'templates@') && github.event_name == 'workflow_dispatch' && github.event.inputs.preid == 'stable' }}
        uses: ncipollo/release-action@v1.10.0
        with:
          artifacts: |
            ${{ github.workspace }}/templates/build/fallback/common.zip
            ${{ github.workspace }}/templates/build/fallback/js.zip
            ${{ github.workspace }}/templates/build/fallback/ts.zip
            ${{ github.workspace }}/templates/build/fallback/python.zip
            ${{ github.workspace }}/templates/build/fallback/csharp.zip
            ${{ github.workspace }}/templates/build/metadata.zip
          name: "Release for ${{ steps.version-change.outputs.TEMPLATE_VERSION }}"
          token: ${{ steps.generate-token.outputs.token }}
          tag: ${{ steps.version-change.outputs.TEMPLATE_VERSION }}
          allowUpdates: true

      - name: Generate Tag List
        if: ${{ contains(steps.version-change.outputs.CHANGED, 'templates@') && github.event_name == 'workflow_dispatch' && github.event.inputs.preid == 'stable' }}
        run: git tag | grep templates > ${{ runner.temp }}/template-tags.txt

      - name: Update Template Tag list Release
        if: ${{ contains(steps.version-change.outputs.CHANGED, 'templates@') && github.event_name == 'workflow_dispatch' && github.event.inputs.preid == 'stable' }}
        uses: ncipollo/release-action@v1.10.0
        with:
          artifacts: ${{ runner.temp }}/template-tags.txt
          name: "Template Tag List"
          body: "Release to maintain template tag list."
          token: ${{ steps.generate-token.outputs.token }}
          tag: "template-tag-list"
          allowUpdates: true

      - name: Release RC VS templates to GitHub
        if: ${{ contains(steps.version-change.outputs.CHANGED, 'templates@') && github.event_name == 'workflow_dispatch' && github.event.inputs.vsrelease == 'true' }}
        uses: ncipollo/release-action@v1.10.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          tag: "templates-vs@0.0.0-rc"
          name: "templates-vs@0.0.0-rc"
          body: "VS Templates RC release for templates-vs@0.0.0-rc"
          commit: ${{ github.sha }}
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          artifacts: |
            ${{ github.workspace }}/templates/build/fallback/csharp.zip
            ${{ github.workspace }}/templates/build/metadata.zip
      
      - name: Get VS Templates version
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.vsrelease == 'true' && github.event.inputs.vstemplate == 'true' }}
        id: vs-template-tag
        run: |
          VS_VERSION=$(node -p "require('./templates/package.json').vsversion")
          echo "VSTAG=templates-vs@$VS_VERSION" >> $GITHUB_OUTPUT

      - name: Release stable VS Templates to GitHub
        uses: ncipollo/release-action@v1.10.0
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.vsrelease == 'true' && github.event.inputs.vstemplate == 'true' }}
        with:
          token: ${{ steps.generate-token.outputs.token }}
          tag: ${{ steps.vs-template-tag.outputs.VSTAG }}
          name: ${{ steps.vs-template-tag.outputs.VSTAG }}
          body: "VS Templates release for ${{ steps.vs-template-tag.outputs.VSTAG }}"
          commit: ${{ github.sha }}
          allowUpdates: true
          removeArtifacts: true
          artifacts: |
            ${{ github.workspace }}/templates/build/fallback/csharp.zip
            ${{ github.workspace }}/templates/build/metadata.zip

      - name: Generate Tag List (VS stable release)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.vsrelease == 'true' && github.event.inputs.vstemplate == 'true' }}
        run: git tag | grep templates > ${{ runner.temp }}/template-tags.txt

      - name: Update Template Tag list Release (VS stable release)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.vsrelease == 'true' && github.event.inputs.vstemplate == 'true' }}
        uses: ncipollo/release-action@v1.10.0
        with:
          artifacts: ${{ runner.temp }}/template-tags.txt
          name: "Template Tag List"
          body: "Release to maintain template tag list."
          token: ${{ steps.generate-token.outputs.token }}
          tag: "template-tag-list"
          allowUpdates: true

      - name: enable prerelease only features
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.preid == 'alpha' || github.event.inputs.preid == 'preview')) }}
        run: |
          bash .github/scripts/prerelease-feature-control.sh
          changes_detected=$(git status --porcelain | grep "packages/vscode-extension/src/releaseBasedFeatureSettings.ts" || true)
          if [ -n "$changes_detected" ]; then
            echo "Changes detected in releaseBasedFeatureSettings.ts"
            git add packages/vscode-extension/src/releaseBasedFeatureSettings.ts
            git commit -m "build: adjust prerelease feature settings"
          else
            echo "No changes detected in releaseBasedFeatureSettings.ts"
          fi
          
      - name: disable chat participant environment variable
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.preid != 'alpha') }}
        run: bash .github/scripts/chat-participant-disabled.sh

      # - name: disable api proposals in package.json
      #   if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.preid != 'alpha') }}
      #   uses: jossef/action-set-json-field@v2.1
      #   with:
      #     file: packages/vscode-extension/package.json
      #     field: enabledApiProposals
      #     value: '[]'
      #     parse_json: true

      - name: disable chat participant in package.json
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.preid != 'alpha') }}
        uses: jossef/action-set-json-field@v2.1
        with:
          file: packages/vscode-extension/package.json
          field: contributes.chatParticipants
          value: '[]'
          parse_json: true

      - name: commit change on local
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.preid != 'alpha') }}
        run: |
          git add ./packages/vscode-extension/package.json ./packages/vscode-extension/src/chat/consts.ts
          git commit -m "build: disable chat participant"

      - name: update cli ai key
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.preid != 'alpha' }}
        uses: jossef/action-set-json-field@v1
        with:
          file: ./packages/cli/package.json
          field: aiKey
          value: ${{ secrets.CLI_PUBLIC_AIKEY }}

      - name: update extension ai key
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.preid != 'alpha' }}
        uses: jossef/action-set-json-field@v1
        with:
          file: ./packages/vscode-extension/package.json
          field: aiKey
          value: ${{ secrets.EXT_PUBLIC_AIKEY }}

      - name: commit change on local
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.preid != 'alpha' }}
        run: |
          git add ./packages/cli/package.json ./packages/vscode-extension/package.json
          git commit -m "build: update ai key"

      - name: publish alpha release to npm org
        if: ${{ github.ref == 'refs/heads/dev'}}
        run: |
          npx lerna publish from-package --dist-tag=alpha --yes --allow-branch dev

      - name: publish preview release to npm org
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.preid == 'preview' }}
        run: |
          npx lerna publish from-package --dist-tag=beta --yes

      - name: publish rc npm packages to npmjs.org
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.preid == 'rc' }}
        run: |
          npx lerna publish from-package --dist-tag=rc --yes

      - name: publish stable npm packages to npmjs.org
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.preid == 'stable' }}
        run: |
          npx lerna publish from-package --yes

      - name: pack server bits
        if: ${{ contains(steps.version-change.outputs.CHANGED, '@microsoft/teamsfx-server') || (github.event_name == 'workflow_dispatch' && github.event.inputs.vsrelease == 'true' ) }}
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 10
          retry_on: error
          command: |
            sleep 20
            pnpm --filter=@microsoft/teamsfx-server... run build
            pnpm --filter @microsoft/teamsfx-server run package
            [ -d ./packages/server/lib ] && find ./packages/server/lib -type f -name '*.exe' -exec mv {} server.exe \;

      - name: pack vsix
        if: ${{ contains(steps.version-change.outputs.CHANGED, 'ms-teams-vscode-extension@') }}
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 10
          retry_on: error
          command: |
            sleep 20
            npm run build
            cd ./packages/vscode-extension
            if [ "$PREID" == "preview" ]; then
              pnpm dlx vsce package --no-dependencies --pre-release
            else
              pnpm dlx vsce package --no-dependencies
            fi

      - name: release stable VSCode extension to github
        if: ${{ contains(steps.version-change.outputs.CHANGED, 'ms-teams-vscode-extension@') && github.event_name == 'workflow_dispatch' && github.event.inputs.preid == 'stable' }}
        uses: ncipollo/release-action@v1.10.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          tag: ${{ steps.version-change.outputs.EXTENSION_VERSION }}
          artifacts: ./packages/**/*.vsix
          artifactErrorsFailBuild: true
          bodyFile: ./CHANGELOG.md

      - name: save release info
        run: |
          rm -f changed.txt
          rm -f versions.json
          echo ${{steps.version-change.outputs.CHANGED}} > changed.txt
          npx lerna ls -all --json > versions.json
          echo ${{ inputs.series }} > series.txt
          echo ${{ inputs.vsChannelName || 'IntPreview' }} > vschannel.txt
          find ./packages/vscode-extension -type f -name '*.vsix' -exec mv {} . \;

      - name: upload release info to artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: |
            changed.txt
            series.txt
            vschannel.txt
            versions.json
            *.vsix
            *.exe

  notify-check-failures:
    needs: cd
    if: ${{ needs.cd.outputs.markdown-check-result == 'failure' || needs.cd.outputs.security-check-vsc-result == 'failure' || needs.cd.outputs.security-check-vs-result == 'failure' || needs.cd.outputs.markdown-check-samples-result == 'failure' || needs.cd.outputs.security-check-samples-result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v3

      - name: Build failure message and subject
        id: build-message
        run: |
          BODY=""
          SUBJECT_PARTS=""
          
          if [ "${{ needs.cd.outputs.markdown-check-result }}" == "failure" ]; then
            BODY="${BODY}<b>Markdown Check Failed</b><br/>Markdown files image/hyperlink availability check failed.<br/><br/>"
            SUBJECT_PARTS="Markdown Check"
          fi
          
          if [ "${{ needs.cd.outputs.markdown-check-samples-result }}" == "failure" ]; then
            if [ -n "$SUBJECT_PARTS" ]; then
              SUBJECT_PARTS="${SUBJECT_PARTS}, Markdown Check (Samples)"
            else
              SUBJECT_PARTS="Markdown Check (Samples)"
            fi
            BODY="${BODY}<b>Markdown Check Failed (Samples Repo)</b><br/>Markdown files image/hyperlink availability check failed in microsoft-365-agents-toolkit-samples repo.<br/><br/>"
          fi
          
          if [ "${{ needs.cd.outputs.security-check-vsc-result }}" == "failure" ]; then
            if [ -n "$SUBJECT_PARTS" ]; then
              SUBJECT_PARTS="${SUBJECT_PARTS}, Security Check (VSC)"
            else
              SUBJECT_PARTS="Security Check (VSC)"
            fi
            BODY="${BODY}<b>Security Check Failed (VSC Templates)</b><br/>Security vulnerabilities found in package.json files under templates/vsc.<br/><br/>"
          fi
          
          if [ "${{ needs.cd.outputs.security-check-vs-result }}" == "failure" ]; then
            if [ -n "$SUBJECT_PARTS" ]; then
              SUBJECT_PARTS="${SUBJECT_PARTS}, Security Check (VS)"
            else
              SUBJECT_PARTS="Security Check (VS)"
            fi
            BODY="${BODY}<b>Security Check Failed (VS Templates)</b><br/>Vulnerable NuGet packages found in C# projects under templates/vs.<br/><br/>"
          fi
          
          if [ "${{ needs.cd.outputs.security-check-samples-result }}" == "failure" ]; then
            if [ -n "$SUBJECT_PARTS" ]; then
              SUBJECT_PARTS="${SUBJECT_PARTS}, Security Check (Samples)"
            else
              SUBJECT_PARTS="Security Check (Samples)"
            fi
            BODY="${BODY}<b>Security Check Failed (Samples Repo)</b><br/>Security vulnerabilities found in package.json files in microsoft-365-agents-toolkit-samples repo.<br/><br/>"
          fi
          
          BODY="${BODY}Please check the workflow run for details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          echo "BODY=${BODY}" >> $GITHUB_OUTPUT
          echo "SUBJECT=[CD Pipeline] ${SUBJECT_PARTS} Failed - ${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Send email notification on check failures
        uses: ./.github/actions/send-email-report
        env:
          TO: M365AgentsToolkitEngineerTeam@microsoft.com
          BODY: '"${{ steps.build-message.outputs.BODY }}"'
          SUBJECT: "${{ steps.build-message.outputs.SUBJECT }}"
          MAIL_CLIENT_ID: ${{ secrets.TEST_CLEAN_CLIENT_ID }}
          MAIL_CLIENT_SECRET: ${{ secrets.TEST_CLEAN_CLIENT_SECRET }}
          MAIL_TENANT_ID: ${{ secrets.TEST_CLEAN_TENANT_ID }}

  trigger-docker-build:
    needs: cd
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Docker Build Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run vscuse-atk-docker-build.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref }} \
            -f run_id=${{ github.run_id }} \
            -f tag=${{ inputs.series == '' && 'latest' || inputs.series }} \
            -f run_test_cases=${{ github.event_name == 'schedule' || inputs.run_test_cases }}
