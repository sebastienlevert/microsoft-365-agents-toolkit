name: uitest-vscuse-common
#
# Reusable workflow that contains the shared pipeline for the two vscuse UI test workflows:
#   - ui-test-vscuse-others.yml    (Feature_* + Sample_* plans)
#   - ui-test-vscuse-template.yml  (all other top-level plans)
#
# Callers pass in the small set of values that differ between the two pipelines:
#   - plan_find_args                : the `find` predicate(s) used to discover default plans
#   - main_timeout_minutes          : timeout for the per-plan job
#   - no_failed_step_text           : text written into error.txt when no failed step id is found
#   - filter_no_errors_found        : also treat literal "No errors found" as empty error info
#   - email_subject_suffix          : e.g. "[Samples + Features]" or "[Templates]"
#
# All workflow_dispatch inputs from the caller are passed through as inputs here.
on:
  workflow_call:
    inputs:
      # Pass-through user inputs from the caller's workflow_dispatch
      test_plan:
        required: false
        type: string
        default: ""
      image_tag:
        required: false
        type: string
        default: "latest"
      vscuse_version:
        required: false
        type: string
        default: "latest"
      email_receiver:
        required: false
        type: string
        default: ""
      max_retries:
        required: false
        type: number
        default: 7
      schedule_trigger:
        required: false
        type: boolean
        default: false

      # Pipeline-specific knobs
      plan_find_args:
        description: "find(1) predicate used to enumerate default plans under plans/. WARNING: value is passed to `eval`; never wire to user-supplied workflow_dispatch inputs."
        required: true
        type: string
      main_timeout_minutes:
        required: false
        type: number
        default: 80
      no_failed_step_text:
        required: false
        type: string
        default: "No failed step found"
      filter_no_errors_found:
        required: false
        type: boolean
        default: false
      email_subject_suffix:
        required: true
        type: string

permissions:
  actions: read

jobs:
  discover-test-plans:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      test-plans: ${{ steps.get-plans.outputs.plans }}
      email-receiver: ${{ steps.set-email.outputs.email_receiver }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set email receiver
        id: set-email
        env:
          INPUT_EMAIL_RECEIVER: ${{ inputs.email_receiver }}
        run: |
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ inputs.schedule_trigger }}" == "true" ]; then
            echo "email_receiver=zhenjiao@microsoft.com;M365AgentsToolkitEngineerTeam@microsoft.com;teamsfxqa@microsoft.com" >> $GITHUB_OUTPUT
            echo "Schedule trigger: Using default email receivers"
          elif [ -n "$INPUT_EMAIL_RECEIVER" ]; then
            echo "email_receiver=$INPUT_EMAIL_RECEIVER" >> $GITHUB_OUTPUT
            echo "Using user-provided email receiver: $INPUT_EMAIL_RECEIVER"
          else
            echo "email_receiver=" >> $GITHUB_OUTPUT
            echo "No email receiver specified"
          fi

      - name: Get test plans
        id: get-plans
        env:
          PLAN_FIND_ARGS: ${{ inputs.plan_find_args }}
          INPUT_TEST_PLAN: ${{ inputs.test_plan }}
        run: |
          if [ -z "$INPUT_TEST_PLAN" ]; then
            # Use caller-supplied find predicate to enumerate default plans
            plans=$(eval "find packages/tests/vscuse/vscode-test-cases/plans/ -maxdepth 1 -type f $PLAN_FIND_ARGS -exec basename {} .json \;" | jq -R -s -c 'split("\n")[:-1]')
            echo "plans=$plans" >> $GITHUB_OUTPUT
            echo "Found test plans: $plans"
          else
            input_plans=$(echo "$INPUT_TEST_PLAN" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R -s -c 'split("\n")[:-1]')
            echo "plans=$input_plans" >> $GITHUB_OUTPUT
            echo "Using input test plans: $input_plans"
          fi

  main:
    name: Case-${{ matrix.test_plan }}
    needs: discover-test-plans
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.main_timeout_minutes }}

    strategy:
      matrix:
        test_plan: ${{ fromJson(needs.discover-test-plans.outputs.test-plans) }}
      fail-fast: false
      max-parallel: 100
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    environment: engineering

    env:
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ vars.TEST_TENANT_AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_API_KEY: ${{ secrets.TEST_TENANT_AZURE_OPENAI_KEY }}
      AZURE_OPENAI_MODEL: ${{ vars.TEST_TENANT_AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_API_VERSION: ${{ vars.TEST_TENANT_AZURE_OPENAI_API_VERSION }}

      # Vision service
      AZURE_VISION_ENDPOINT: ${{ vars.AZURE_VISION_ENDPOINT }}
      AZURE_VISION_KEY: ${{ secrets.AZURE_VISION_KEY }}

      # AZURE AI search
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME: "text-embedding-ada-002"
      AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
      AZURE_SEARCH_KEY: ${{ secrets.AZURE_SEARCH_KEY }}
      # Azure Service Principal for M365 Toolkit authentication
      #AZURE_CLIENT_ID: ${{ secrets.AZURE_SERVICE_PRINCIPAL_ID }}
      #AZURE_CLIENT_SECRET: ${{ secrets.AZURE_SERVICE_PRINCIPAL_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.TEST_TENANT_TENANT_ID  }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.TEST_TENANT_SUBSCRIPTION_ID }}
      RESOURCE_GROUP_REGION: ${{ vars.RESOURCE_GROUP_REGION }}
      AZURE_AUTH_ENABLED: ${{ secrets.AZURE_SERVICE_PRINCIPAL_ID != '' && secrets.AZURE_SERVICE_PRINCIPAL_SECRET != '' && secrets.TEST_TENANT_TENANT_ID != '' }}
      # M365 account for testing (comma-separated list from GitHub variable)
      M365_USERNAMES: ${{ vars.M365_USERNAMES }}
      M365_ACCOUNT_PASSWORD: ${{ secrets.TEST_TENANT_M365_ACCOUNT_PASSWORD }}
      # The test account for Copilot features
      M365_ACCOUNT_NAME_EnableCopilotAccess: ${{ secrets.TEST_TENANT_M365_ACCOUNT_NAME }}
      M365_ACCOUNT_PASSWORD_EnableCopilotAccess: ${{ secrets.TEST_TENANT_M365_ACCOUNT_PASSWORD }}

      # M365 admin account with Global admin role
      M365_ACCOUNT_ADMIN_ACCOUNT: ${{ vars.TEST_TENANT_M365_ACCOUNT_ADMIN_ACCOUNT }}
      M365_ACCOUNT_ADMIN_PASSWORD: ${{ secrets.TEST_TENANT_M365_ACCOUNT_ADMIN_PASSWORD }}

      # M365 account without copilot license
      M365_ACCOUNT_NO_COPILOT_NAME: ${{ vars.TEST_TENANT_M365_ACCOUNT_NO_COPILOT_NAME }}
      M365_ACCOUNT_NO_COPILOT_PASSWORD: ${{ secrets.TEST_TENANT_M365_ACCOUNT_NO_COPILOT_PASSWORD }}

      AZURE_ACCOUNT_NAME: ${{ secrets.TEST_TENANT_AZURE_ACCOUNT_NAME }}
      AZURE_ACCOUNT_PASSWORD: ${{ secrets.TEST_TENANT_AZURE_ACCOUNT_PASSWORD }}
      M365_TENANT_ID: ${{ secrets.TEST_CLEAN_TENANT_ID }}
      # GITHUB test account
      GITHUB_ACCOUNT_NAME: ${{ secrets.GH_ACCOUNT_NAME }}
      GITHUB_ACCOUNT_PASSWORD: ${{ secrets.GH_ACCOUNT_PASSWORD }}
      GITHUB_MFA_SECRET: ${{ secrets.GH_MFA_SECRET }}
      #Additional value:
      DA_MCP_ENTRA_SSO_CLIENTID: ${{ secrets.DA_MCP_ENTRA_SSO_CLIENTID }}
      DA_MCP_OAUTH_CLIENT_SECERT: ${{ secrets.DA_MCP_OAUTH_CLIENT_SECERT }}
      DA_MCP_OAUTH_CLIENTID: ${{ secrets.DA_MCP_OAUTH_CLIENTID }}

      # SQL server
      SQL_USER: ${{ secrets.SQL_USER }}
      SECRET_SQL_PASSWORD: ${{ secrets.SECRET_SQL_PASSWORD }}
      SQL_SERVER: "vscuse-test-sql.database.windows.net"
      SQL_DATABASE: "vscuse-test-db"

      # reddit
      REDDIT_ID: "${{secrets.REDDIT_ID}}"
      SECRET_REDDIT_PASSWORD: ${{secrets.SECRET_REDDIT_PASSWORD}}

      # Foundry related parameters
      AZURE_AI_FOUNDRY_PROJECT_ENDPOINT: ${{ vars.AZURE_AI_FOUNDRY_PROJECT_ENDPOINT }}
      AGENT_ID: ${{ secrets.AGENT_ID }}

      # ms account
      MS_AZURE_ACCOUNT_NAME: ${{vars.MS_AZURE_ACCOUNT_NAME}}
      MS_AZURE_ACCOUNT_PASSWORD: ${{secrets.MS_AZURE_ACCOUNT_PASSWORD}}

      # Test AAD App info
      TEST_AAD_APP_ID: ${{vars.TEST_AAD_APP_ID}}
      TEST_AAD_APP_PASSWORD: ${{secrets.TEST_AAD_APP_PASSWORD}}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies for download actions
        run: npm install @octokit/auth-app @octokit/request @octokit/core node-fetch
        shell: bash

      - name: Run download script
        run: node download-vscuse-python.js "${{ inputs.vscuse_version }}" "${{ github.workspace }}/packages/tests/vscuse/vscode-test-cases"
        shell: bash
        working-directory: .github/actions/setup-vscuse-environment

      - name: Set up Python virtual environment and install wheel
        run: |
          cd packages/tests/vscuse/vscode-test-cases
          python -m venv .venv
          source .venv/bin/activate
          WHEEL_FILE=$(ls *.whl | head -n 1)
          pip install "./$WHEEL_FILE"
        shell: bash

      - name: Verify Azure Configuration
        run: |
          echo "Verifying Azure configuration..."
          if [ -z "$AZURE_OPENAI_ENDPOINT" ] || [ -z "$AZURE_OPENAI_API_KEY" ]; then
            echo "❌ Azure OpenAI configuration missing"
            exit 1
          else
            echo "✅ Azure OpenAI configured"
          fi
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_CLIENT_SECRET" ] && [ -n "$AZURE_TENANT_ID" ]; then
            echo "✅ Azure Service Principal configured - M365 Toolkit authentication enabled"
          else
            echo "⚠️  Azure Service Principal not configured - M365 Toolkit authentication disabled"
          fi

      - name: Set m365 account randomly
        run: |
          IFS=',' read -ra users <<< "$M365_USERNAMES"
          for i in "${!users[@]}"; do
            users[$i]=$(echo "${users[$i]}" | xargs)
          done
          count=${#users[@]}
          index=$((RANDOM%$count))
          echo "account index: $index, total accounts: $count"
          echo "M365_ACCOUNT_NAME=${users[index]}" >> $GITHUB_ENV

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built Docker image
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"
          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="latest"
          fi
          VSCUSE_VSCODE_IMAGE="ghcr.io/officedev/vscuse-atk-vscode:$IMAGE_TAG"
          echo "VSCUSE_VSCODE_IMAGE=$VSCUSE_VSCODE_IMAGE" >> $GITHUB_ENV
          echo "Pulling pre-built Docker image: $VSCUSE_VSCODE_IMAGE"
          docker pull $VSCUSE_VSCODE_IMAGE
          echo "✅ Image pulled successfully!"
          docker images $VSCUSE_VSCODE_IMAGE

      - name: Run test
        run: |
          echo "🚀 Running test plan: ${{ matrix.test_plan }}"
          echo "Using image tag: ${{ inputs.image_tag }}"
          echo "Test execution started at: $(date)"

          set -o pipefail
          cd packages/tests/vscuse/vscode-test-cases
          python -m venv .venv
          source .venv/bin/activate
          vscuse execute --config-file ./config.yaml --groups-dir groups ./plans/${{ matrix.test_plan }}.json 2>&1 | tee run_result.txt

      - name: Extract errors from run result
        if: always()
        env:
          NO_FAILED_STEP_TEXT: ${{ inputs.no_failed_step_text }}
        run: |
          if [ -f "packages/tests/vscuse/vscode-test-cases/run_result.txt" ]; then
            ROOT_DIR="packages/tests/vscuse/vscode-test-cases"
            RUN_RESULT="$ROOT_DIR/run_result.txt"

            failed_step_id=$(awk '
              /^Errors:/ { in_errors = 1; next }
              in_errors && match($0, /step_[A-Za-z0-9]+/) {
                print substr($0, RSTART, RLENGTH)
                exit
              }
            ' "$RUN_RESULT")

            if [ -n "$failed_step_id" ]; then
              # Prefer the human-readable step name from the executor log line:
              #   [EXECUTING] Step <id>: <name>
              failed_step_name=$(grep -oE "\[EXECUTING\] Step ${failed_step_id}: .*" "$RUN_RESULT" \
                | head -n 1 \
                | sed "s/.*\[EXECUTING\] Step ${failed_step_id}: //")

              # Fall back to the step description from the plan JSON.
              if [ -z "$failed_step_name" ]; then
                failed_step_name=$(find "$ROOT_DIR" -type f -name "*.json" -print0 \
                  | xargs -0 jq -r --arg sid "$failed_step_id" '.. | objects | select(.step_id? == $sid) | .description // empty' 2>/dev/null \
                  | head -n 1)
              fi

              if [ -n "$failed_step_name" ]; then
                echo "${failed_step_id}: ${failed_step_name}" > error.txt
              else
                echo "$failed_step_id" > error.txt
              fi
            else
              echo "$NO_FAILED_STEP_TEXT" > error.txt
            fi

            echo "Extracted errors:"
            cat error.txt
          else
            echo "No run_result.txt found" > error.txt
          fi

      - name: Upload error file
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: error-file-${{ matrix.test_plan }}-${{ github.run_id }}
          path: error.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Rename test_report.html to index.html
        if: always()
        run: |
          REPORT_DIR="packages/tests/vscuse/vscode-test-cases/test_report"
          if [ -f "$REPORT_DIR/test_report.html" ]; then
            mv "$REPORT_DIR/test_report.html" "$REPORT_DIR/index.html"
            echo "Renamed test_report.html to index.html"
          else
            echo "No test_report.html found to rename"
          fi

      - name: Encrypt and zip test report
        if: always()
        run: |
          REPORT_DIR="packages/tests/vscuse/vscode-test-cases/test_report"
          ZIP_FILE="test-report-${{ matrix.test_plan }}-${{ github.run_number }}.zip"

          if [ -z "${{ secrets.ARTIFACT_ZIP_PASSWORD }}" ]; then
            echo "❌ Error: ARTIFACT_ZIP_PASSWORD secret is not set"
            echo "Please configure the ARTIFACT_ZIP_PASSWORD secret in repository settings"
            exit 1
          fi

          sudo apt-get update && sudo apt-get install -y zip

          cd "$REPORT_DIR"
          zip -e -P "${{ secrets.ARTIFACT_ZIP_PASSWORD }}" "$ZIP_FILE" index.html
          cd -

          echo "✅ Created encrypted zip: $REPORT_DIR/$ZIP_FILE"
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
        shell: bash

      - name: Upload encrypted test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-report-${{ matrix.test_plan }}-${{ github.run_number }}
          path: packages/tests/vscuse/vscode-test-cases/test_report/${{ env.ZIP_FILE }}
          retention-days: 7
          if-no-files-found: ignore

      - name : Login to Azure
        if: always()
        uses: azure/login@v2
        with:
          client-id: ${{secrets.DEVOPS_CLIENT_ID}}
          tenant-id: ${{secrets.DEVOPS_TENANT_ID}}
          subscription-id: ${{secrets.DEVOPS_SUB_ID}}
          enable-AzPSSession: true

      - name: 🌐Upload files to Azure Blob Storage
        if: always()
        shell: pwsh
        run: |
          $guid = [guid]::NewGuid().ToString()
          $account = $env:AZURE_STORAGE_ACCOUNT
          $sourcePath = "packages/tests/vscuse/vscode-test-cases/test_report/"
          $destination = "`content/$guid"
          $storageUrl = "https://storproxy-app-voazuxhhvtgiq.azurewebsites.net/$guid/index.html"

          Write-Host "🌐Here is the report: $storageUrl"

          echo "$storageUrl" > storage_url.txt

          az storage blob upload-batch `
            --account-name $account `
            --auth-mode login `
            --destination $destination `
            --source "$sourcePath" `
            --overwrite
        env:
          AZURE_STORAGE_ACCOUNT: storproxystvoazuxhhvtgiq

      - name: Upload storage URL artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: storage-url-${{ matrix.test_plan }}-${{ github.run_id }}
          path: storage_url.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up resources..."
          echo "Cleaning up VSCode containers..."
          docker stop $(docker ps -q --filter "ancestor=ghcr.io/officedev/vscuse-atk-vscode:${{ inputs.image_tag }}") 2>/dev/null || echo "No containers to stop"
          docker rm $(docker ps -aq --filter "ancestor=ghcr.io/officedev/vscuse-atk-vscode:${{ inputs.image_tag }}") 2>/dev/null || echo "No containers to remove"

  rerun:
    continue-on-error: true
    permissions:
      actions: write
    needs: main
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || inputs.schedule_trigger == true) && failure() && github.run_attempt < inputs.max_retries }}
    runs-on: ubuntu-latest
    env:
      MAX_RETRIES: ${{ inputs.max_retries }}
    steps:
      - name: Calculate max retries
        id: calc-retries
        run: |
          max_retries=${{ inputs.max_retries }}
          if [ "$max_retries" -gt 20 ]; then
            max_retries=20
          fi
          if [ "$max_retries" -lt 1 ]; then
            max_retries=1
          fi
          echo "max_retries=$max_retries" >> $GITHUB_OUTPUT
          echo "Using max retries: $max_retries"
      - name: trigger rerun workflow
        run: |
          curl \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"\
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/rerun.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}","inputs":{"run_id":"${{ github.run_id }}", "max_attempts":"${{ steps.calc-retries.outputs.max_retries }}"}}'

  report:
    if: ${{ always() && (github.event_name == 'schedule' || inputs.schedule_trigger == true || needs.discover-test-plans.outputs.email-receiver != '') && (success() || github.run_attempt == inputs.max_retries) }}
    needs: [discover-test-plans, main]
    environment: engineering
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tests/vscuse
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: azure/login@v2
        with:
          client-id: ${{secrets.DEVOPS_CLIENT_ID}}
          tenant-id: ${{secrets.DEVOPS_TENANT_ID}}
          subscription-id: ${{secrets.DEVOPS_SUB_ID}}
          enable-AzPSSession: true

      - name: Download storage URLs
        uses: actions/download-artifact@v7
        with:
          pattern: storage-url-*
          path: /tmp/storage-urls

      - name: Download error files
        uses: actions/download-artifact@v7
        with:
          pattern: error-file-*
          path: /tmp/error-files

      - name: Process storage URLs
        shell: bash
        run: |
          if [ -d "/tmp/storage-urls" ]; then
            echo "Found storage URLs folder. Processing contents..."
            find /tmp/storage-urls -name "*.zip" -exec unzip -o {} -d /tmp/storage-urls \;

            echo "{" > /tmp/url_mapping.json
            first_entry=true

            find /tmp/storage-urls -type f -name "storage_url.txt" | while read file; do
              dir_name=$(basename $(dirname "$file"))
              run_id=$(echo "$dir_name" | rev | cut -d'-' -f1 | rev)
              test_plan=$(echo "$dir_name" | sed "s/^storage-url-//" | sed "s/-${run_id}$//")
              case_run_id="${test_plan}-${run_id}"

              echo "Processing: dir_name=$dir_name, test_plan=$test_plan, run_id=$run_id, case_run_id=$case_run_id"

              content_json=$(cat "$file" | tr -d '\n' | tr -d '\r' | jq -Rs .)

              if [ "$first_entry" = true ]; then
                first_entry=false
              else
                echo "," >> /tmp/url_mapping.json
              fi

              key_json=$(printf '%s' "$case_run_id" | jq -Rs .)
              echo "  $key_json: $content_json" >> /tmp/url_mapping.json
            done

            echo "}" >> /tmp/url_mapping.json

            echo "Generated JSON mapping:"
            cat /tmp/url_mapping.json

            total_urls=$(find /tmp/storage-urls -type f -name "storage_url.txt" | wc -l)
            echo "Total storage URL files processed: $total_urls"
          else
            echo "No storage URL artifacts found"
            echo "{}" > /tmp/url_mapping.json
          fi

      - name: Process error files
        shell: bash
        run: |
          if [ -d "/tmp/error-files" ]; then
            echo "Found error files folder. Processing contents..."

            find /tmp/error-files -name "*.zip" -exec unzip -o {} -d /tmp/error-files \;

            echo "{" > /tmp/error_mapping.json
            first_entry=true

            find /tmp/error-files -type f -name "error.txt" | while read file; do
              dir_name=$(basename $(dirname "$file"))
              run_id=$(echo "$dir_name" | rev | cut -d'-' -f1 | rev)
              test_plan=$(echo "$dir_name" | sed "s/^error-file-//" | sed "s/-${run_id}$//")
              case_run_id="${test_plan}-${run_id}"

              echo "Processing error: dir_name=$dir_name, test_plan=$test_plan, run_id=$run_id, case_run_id=$case_run_id"

              content_json=$(cat "$file" | tr -d '\n' | tr -d '\r' | jq -Rs .)

              if [ "$first_entry" = true ]; then
                first_entry=false
              else
                echo "," >> /tmp/error_mapping.json
              fi

              key_json=$(printf '%s' "$case_run_id" | jq -Rs .)
              echo "  $key_json: $content_json" >> /tmp/error_mapping.json
            done

            echo "}" >> /tmp/error_mapping.json

            echo "Generated error JSON mapping:"
            cat /tmp/error_mapping.json
          else
            echo "No error file artifacts found"
            echo "{}" > /tmp/error_mapping.json
          fi

      - name: Install Dateutils
        run: |
          sudo apt install dateutils

      - name: list jobs
        id: list-jobs
        working-directory: packages/tests/vscuse
        env:
          AZURE_DEVOPS_ORG: "msazure"
          AZURE_DEVOPS_PROJECT: "Microsoft%20Teams%20Extensibility"
          EMAIL_SUBJECT_SUFFIX: ${{ inputs.email_subject_suffix }}
          FILTER_NO_ERRORS_FOUND: ${{ inputs.filter_no_errors_found }}
        run: |
          AZURE_DEVOPS_PAT=$(az account get-access-token --resource https://app.vssps.visualstudio.com --query accessToken -o tsv)
          page=1
          jobs="[]"
          echo "Initial jobs: $jobs"

          report_map_json_file_path="/tmp/url_mapping.json"
          error_map_json_file_path="/tmp/error_mapping.json"

          query_bugs_by_tag() {
            local tag="$1"
            # Escape single quotes for WIQL string literal.
            local escaped_tag="${tag//\'/\'\'}"

            local wiql_query="{\"query\": \"SELECT [System.Id], [System.Title], [System.State] FROM WorkItems WHERE [System.WorkItemType] = 'Bug' AND [System.State] IN ('Active','New','Committed') AND [System.Tags] CONTAINS '${escaped_tag}'\"}"

            local http_code
            local response
            response=$(curl -s -w "\n%{http_code}" -u ":${AZURE_DEVOPS_PAT}" \
              -H "Content-Type: application/json" \
              -X POST \
              "https://dev.azure.com/${AZURE_DEVOPS_ORG}/${AZURE_DEVOPS_PROJECT}/_apis/wit/wiql?api-version=7.0" \
              -d "$wiql_query")

            http_code=$(echo "$response" | tail -n1)
            response=$(echo "$response" | sed '$d')

            if [ "$http_code" != "200" ]; then
              echo "HTTP_ERROR:$http_code"
              return 1
            fi

            if ! echo "$response" | jq empty 2>/dev/null; then
              echo "HTTP_ERROR:INVALID_JSON"
              return 1
            fi

            echo "$response"
          }

          while :
          do
            url="https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}/jobs?per_page=50&page=$page"
            echo "Fetching URL: $url"

            resp=$(curl -sf -D /tmp/gh_headers_$page -H "Accept: application/vnd.github.v3+json" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "$url")

            new_jobs=$(echo "$resp" | jq -cr '.jobs')
            new_jobs_count=$(echo "$resp" | jq -r '.jobs | length')
            echo "Page $page: fetched $new_jobs_count jobs"

            jobs=$(jq -cr --slurp 'add' <(echo "$jobs") <(echo "$new_jobs"))

            has_next=$(grep -Fi "link:" /tmp/gh_headers_$page 2>/dev/null | grep "rel=\"next\"" || true)
            rm -f /tmp/gh_headers_$page

            if [ -z "$has_next" ]; then
              break
            fi

            page=$((page+1))
          done

          total_jobs=$(echo "$jobs" | jq 'length')
          echo "Total jobs fetched across all pages: $total_jobs"

          cases=$(echo "$jobs" | jq -r '[.[] | select(.name | contains("Case-")) | .name] | unique | .[]')
          echo "Extracted case names: $cases"

          passed=0
          failed=0
          failedlimit=100
          passedlimit=100
          failedlist=""
          passedlist=""
          lists=""
          failed_rows=""

          emails="${{ needs.discover-test-plans.outputs.email-receiver }}"
          echo "Initial email list: $emails"

          while IFS= read -r case;
          do
            if [ -z "$case" ]; then
              continue
            fi

            name=$(echo "$case" | awk -F '|' '{print $1}')
            case_id=$(echo "$name" | awk -F '-' '{print $2}')

            title="Unknown Test Case Title"
            work_item_url="N/A"
            owner="N/A"

            plan_file="./vscode-test-cases/plans/${case_id}.json"
            if [ -f "$plan_file" ]; then
              title=$(jq -r '.plan_metadata.name // "Unknown Test Case Title"' "$plan_file")
              owner=$(jq -r '.plan_metadata.description.owner // "N/A"' "$plan_file")

              workitem=$(jq -r '.plan_metadata.description.workitem // ""' "$plan_file")
              if [ -n "$workitem" ] && [ "$workitem" != "null" ]; then
                work_item_links=""
                for item_id in $(echo "$workitem" | tr ',;' ' '); do
                  item_id=$(echo "$item_id" | xargs)
                  if [ -n "$item_id" ]; then
                    if [[ "$item_id" =~ ^[0-9]+$ ]]; then
                      if [ -n "$work_item_links" ]; then
                        work_item_links="$work_item_links, "
                      fi
                      work_item_links="$work_item_links<a href=\"https://msazure.visualstudio.com/Microsoft%20Teams%20Extensibility/_workitems/edit/$item_id\">$item_id</a>"
                    fi
                  fi
                done
                if [ -n "$work_item_links" ]; then
                  work_item_url="$work_item_links"
                else
                  work_item_url="$workitem"
                fi
              fi
            else
              title=$(echo "$case_id" | tr '_' ' ')
            fi

            status=$(echo "$jobs" | jq --arg case "$case" -r '[.[] | select(.name == $case)] | last | .conclusion // "unknown"')
            run_id=$(echo "$jobs" | jq --arg case "$case" -r '[.[] | select(.name == $case)] | last | .run_id')
            lookup_key="${case_id}-${run_id}"

            report_url=$(jq -r --arg key "$lookup_key" '.[$key]' "$report_map_json_file_path")
            if [ -z "$report_url" ] || [ "$report_url" = "null" ]; then
              report_url="N/A"
            else
              report_url="<a href=\"$report_url\">Report</a>"
            fi

            error_info=$(jq -r --arg key "$lookup_key" '.[$key]' "$error_map_json_file_path")
            if [ -z "$error_info" ] || [ "$error_info" = "null" ]; then
              error_info=""
            fi
            if [ "$FILTER_NO_ERRORS_FOUND" = "true" ] && [ "$error_info" = "No errors found" ]; then
              error_info=""
            fi

            # Only show failed-step details for failed jobs.
            # Also guards against any unexpected stale artifact entries.
            if [ "$status" = "success" ]; then
              error_info=""
            fi

            if [[ -n "$email" && ! "$emails" == *"$email"* && "$status" == "failure" ]]; then
              emails="$emails;$email;"
            fi

            started_at=$(echo "$jobs" | jq --arg case "$case" -r '[.[] | select(.name == $case)] | last | .started_at // empty')
            completed_at=$(echo "$jobs" | jq --arg case "$case" -r '[.[] | select(.name == $case)] | last | .completed_at // empty')

            if [ -n "$started_at" ] && [ -n "$completed_at" ]; then
              duration=$(dateutils.ddiff "$started_at" "$completed_at" -f "%Mm %Ss" 2>/dev/null) || duration="N/A"
            else
              duration="N/A"
            fi

            label=""
            row_style=""
            if [ "$status" == "success" ]; then
              passed=$((passed+1))
              row_style="background-color:#f0fdf4;"
              label="<span style=\"display:inline-block;padding:2px 8px;border-radius:9999px;background-color:#2aa198;color:#ffffff;font-weight:bold;\">PASSED</span>"
            else
              failed=$((failed+1))
              row_style="background-color:#fef2f2;"
              label="<span style=\"display:inline-block;padding:2px 8px;border-radius:9999px;background-color:#dc322f;color:#ffffff;font-weight:bold;\">FAILED</span>"
            fi

            url=$(echo "$jobs" | jq --arg case "$case" -r '[.[] | select(.name == $case)] | last | .html_url')
            display_name=$(echo "$name" | sed 's/^Case-//')
            url="<a href=\"$url\">$display_name</a>"

            linked_bugs=""
            if [ "$status" != "success" ]; then
              bug_response=""
              bug_ids=""
              query_error=""

              if [ -z "$AZURE_DEVOPS_PAT" ]; then
                query_error="⚠️No ADO PAT configured"
              else
                # Try multiple case-name variants to avoid missing matches due to
                # underscore/space/case differences between pipeline case name and ADO tags.
                case_name_space=$(echo "$case_id" | tr '_' ' ')
                case_name_hyphen=$(echo "$case_id" | sed 's/_/-/g')
                candidate_tags=$(printf '%s\n%s\n%s\n%s\n%s' "$display_name" "$case_id" "$title" "$case_name_space" "$case_name_hyphen" | awk 'NF && !seen[$0]++')

                while IFS= read -r candidate_tag; do
                  if [ -z "$candidate_tag" ]; then
                    continue
                  fi

                  current_response=$(query_bugs_by_tag "$candidate_tag" 2>/dev/null)
                  query_exit_code=$?

                  if [ $query_exit_code -ne 0 ]; then
                    if [ -z "$query_error" ]; then
                      if echo "$current_response" | grep -q "^HTTP_ERROR:"; then
                        error_detail=$(echo "$current_response" | sed 's/^HTTP_ERROR://')
                        query_error="⚠️ADO API error (HTTP $error_detail)"
                      else
                        query_error="⚠️Network issue"
                      fi
                    fi
                    continue
                  fi

                  api_error=$(echo "$current_response" | jq -r '.message // empty' 2>/dev/null)
                  if [ -n "$api_error" ]; then
                    if [ -z "$query_error" ]; then
                      query_error="⚠️ADO API error"
                    fi
                    continue
                  fi

                  current_ids=$(echo "$current_response" | jq -r '.workItems[]?.id // empty' 2>/dev/null)
                  if [ -n "$current_ids" ]; then
                    bug_ids=$(printf '%s\n%s\n' "$bug_ids" "$current_ids")
                    query_error=""
                  fi
                done <<< "$candidate_tags"

                bug_ids=$(echo "$bug_ids" | awk 'NF && !seen[$0]++')
              fi

              if [ -n "$query_error" ]; then
                linked_bugs="$query_error"
              else
                if [ -n "$bug_ids" ]; then
                  bug_links=""
                  for bug_id in $bug_ids; do
                    if [ -n "$bug_links" ]; then
                      bug_links="$bug_links, "
                    fi
                    bug_links="$bug_links<a href=\"https://dev.azure.com/${AZURE_DEVOPS_ORG}/${AZURE_DEVOPS_PROJECT}/_workitems/edit/$bug_id\">🐞$bug_id</a>"
                  done
                  linked_bugs="$bug_links"
                else
                  linked_bugs="❌Failed but no bug yet"
                fi
              fi
            fi

            row="<tr style=\"$row_style\"> <td style=\"text-align:left;border:1px solid #d1d5db;padding:8px;\">$url</td> <td style=\"text-align:center;border:1px solid #d1d5db;padding:8px;\">$label</td> <td style=\"text-align:center;border:1px solid #d1d5db;padding:8px;\">$owner</td> <td style=\"text-align:center;border:1px solid #d1d5db;padding:8px;\">$work_item_url</td> <td style=\"text-align:center;border:1px solid #d1d5db;padding:8px;\">$linked_bugs</td> <td style=\"text-align:center;border:1px solid #d1d5db;padding:8px;\">$duration</td> <td style=\"text-align:center;border:1px solid #d1d5db;padding:8px;\">$report_url</td> <td style=\"text-align:left;border:1px solid #d1d5db;padding:8px;\">$error_info</td> </tr>"

            if [[ "$status" == "success" && $passed -lt $passedlimit ]]; then
              passedlist="$passedlist $row"
            elif [[ "$status" != "success" && $failed -lt $failedlimit ]]; then
              failed_rows="${failed_rows}${owner}|||${row}"$'\n'
            fi

          done <<< "$cases"

          failedlist=$(echo "$failed_rows" | sort | sed 's/^[^|]*|||//')
          lists="$failedlist $passedlist"

          body="<div style=\"font-family:Arial,sans-serif;font-size:14px;color:#111827;\"><a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Test report link</a><br/><br/><table style=\"border-collapse:collapse;width:100%;\"><tr><th style=\"border:1px solid #d1d5db;padding:8px;background-color:#f3f4f6;\">CASE</th><th style=\"border:1px solid #d1d5db;padding:8px;background-color:#f3f4f6;\">STATUS</th><th style=\"border:1px solid #d1d5db;padding:8px;background-color:#f3f4f6;\">OWNER</th><th style=\"border:1px solid #d1d5db;padding:8px;background-color:#f3f4f6;\">WORK ITEM</th><th style=\"border:1px solid #d1d5db;padding:8px;background-color:#f3f4f6;\">LINKED BUG(S)</th><th style=\"border:1px solid #d1d5db;padding:8px;background-color:#f3f4f6;\">DURATION</th><th style=\"border:1px solid #d1d5db;padding:8px;background-color:#f3f4f6;\">REPORT</th><th style=\"border:1px solid #d1d5db;padding:8px;background-color:#f3f4f6;\">Failed Step</th></tr>$lists</table><br/></div>"

          total=$((passed+failed))
          echo "Total jobs: $total, Passed: $passed, Failed: $failed"

          subject="Vsc Use UI Test Report ${EMAIL_SUBJECT_SUFFIX} ($passed/$total Passed)"
          if [ $failed -gt 0 ]; then
            subject="[FAILED] $subject"
          else
            subject="[PASSED] $subject"
          fi
          echo "Final subject: $subject"

          printf '%s' "$body" > email-body.html
          echo "BODY_FILE=$(pwd)/email-body.html" >> $GITHUB_ENV
          echo "to=$emails" >> $GITHUB_OUTPUT
          echo "subject=$subject" >> $GITHUB_OUTPUT

      - name: Verify email body file
        if: always()
        run: |
          if [ ! -f "email-body.html" ]; then
            echo "email-body.html not found, creating empty file"
            touch email-body.html
            echo "BODY_FILE=$(pwd)/email-body.html" >> $GITHUB_ENV
          fi
          echo "Email body file size: $(wc -c < email-body.html) bytes"

      # Upload the aggregated email-body.html to the same blob proxy so PR-triggered
      # runs (whose email goes to an unattended mailbox) can still surface a single
      # shareable report URL. Printed marker "Report Summary URL: <url>" is parsed by
      # pr-vscuse-test.yml to render the link in its PR comment.
      - name: Upload aggregated report to Azure Blob Storage
        if: always()
        shell: pwsh
        working-directory: packages/tests/vscuse
        run: |
          if (-not (Test-Path "email-body.html")) {
            Write-Host "email-body.html not found; skipping aggregate upload."
            exit 0
          }

          $guid = [guid]::NewGuid().ToString()
          $account = $env:AZURE_STORAGE_ACCOUNT
          $summaryUrl = "https://storproxy-app-voazuxhhvtgiq.azurewebsites.net/$guid/index.html"

          Copy-Item "email-body.html" "index.html" -Force

          az storage blob upload `
            --account-name $account `
            --auth-mode login `
            --container-name 'content' `
            --name "$guid/index.html" `
            --file "index.html" `
            --content-type "text/html" `
            --overwrite

          Write-Host "Report Summary URL: $summaryUrl"
        env:
          AZURE_STORAGE_ACCOUNT: storproxystvoazuxhhvtgiq

      - name: Send E-mail
        uses: ./.github/actions/send-email-report-vscuse
        env:
          TO: ${{ steps.list-jobs.outputs.to }}
          SUBJECT: ${{ steps.list-jobs.outputs.subject }}
          MAIL_CLIENT_ID: ${{ secrets.TEST_CLEAN_CLIENT_ID }}
          MAIL_CLIENT_SECRET: ${{ secrets.TEST_CLEAN_CLIENT_SECRET }}
          MAIL_TENANT_ID: ${{ secrets.TEST_CLEAN_TENANT_ID }}
